    name: "Slot 1 Name"
    id: slot1_name
    mode: text
    max_length: 20
    optimistic: true
    restore_value: true
    initial_value: "Slot 1"
    entity_category: config
    on_value:
      - lambda: id(fpc)->set_slot_name(1, x);
