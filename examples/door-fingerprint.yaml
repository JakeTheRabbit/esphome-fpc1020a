# Onboard SK6812 RGB LED (GPIO27): blue = waiting for finger (enroll),
# green = accepted, red = rejected/failed, off = idle scanning
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    internal: true
    pin: GPIO27
    num_leds: 1
    rgb_order: GRB
    chipset: SK6812
    default_transition_length: 0s

interval:
  - interval: 250ms
    then:
      - lambda: |-
          static int last = -1;
          const int s = id(fpc)->ui_state();
          if (s == last) return;
          last = s;
          if (s == 0) {
            auto c = id(status_led).turn_off();
            c.perform();
            return;
          }
          auto c = id(status_led).turn_on();
          c.set_brightness(0.5f);
          if (s == 1)      c.set_rgb(0.0f, 0.3f, 1.0f);
          else if (s == 2) c.set_rgb(0.0f, 1.0f, 0.0f);
          else             c.set_rgb(1.0f, 0.0f, 0.0f);
          c.perform();
