# Complete config for an M5Stack Atom Lite + M5Stack Finger unit (FPC1020A)
# acting as a door fingerprint reader for Home Assistant.
#
# - Register prints from the HA device page or http://<device-ip>/
# - Recognised finger fires esphome.fingerprint_matched {node, user_id, user_name}
# - No API encryption / OTA password by design (trusted-LAN device) — add them
#   back if your network warrants it.

esphome:
  name: door-fingerprint
  friendly_name: Door Fingerprint
  # Wire the fingerprint driver to the display entities below.
  on_boot:
    then:
      - lambda: |-
          id(fpc)->set_match_text(id(last_finger));
          id(fpc)->set_status_text(id(enroll_status));
          id(fpc)->set_count_sensor(id(finger_count));
          id(fpc)->set_matched_bin(id(finger_ok));
          id(enroll_status).publish_state("Idle");

esp32:
  board: m5stack-atom
  framework:
    type: arduino

external_components:
  - source: github://JakeTheRabbit/esphome-fpc1020a@main
    components: [fpc1020a]

logger:

api:
  reboot_timeout: 0s
  # allows the driver to fire esphome.fingerprint_* events into HA
  homeassistant_services: true
  # exposes enroll/delete as HA actions (esphome.door_fingerprint_*)
  custom_services: true

ota:
  - platform: esphome

# Built-in web UI for finger registration without HA:
# set the slot name, pick the slot, press Enroll.
web_server:
  port: 80

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Fallback hotspot if WiFi fails
  ap:
    ssid: "Door-Fingerprint Fallback"
    password: "change-me-12345"

captive_portal:

# --- M5Stack Finger unit (FPC1020A) on the Grove port ---
uart:
  id: fp_uart
  rx_pin: GPIO32
  tx_pin: GPIO26
  baud_rate: 19200

fpc1020a:
  id: fpc
  uart_id: fp_uart

text_sensor:
  # Name of the last matched finger ("Unknown finger" for rejects)
  - platform: template
    name: "Last Fingerprint"
    id: last_finger
    icon: mdi:fingerprint
  # Live walkthrough during enrollment ("Place finger (1/3)" etc.)
  - platform: template
    name: "Enrollment Status"
    id: enroll_status
    icon: mdi:progress-check

binary_sensor:
  # Pulses ON for 1.5s on any accepted finger (the event has the details)
  - platform: template
    name: "Fingerprint Accepted"
    id: finger_ok
    icon: mdi:fingerprint

  # Onboard button (GPIO39)
  - platform: gpio
    pin:
      number: GPIO39
      inverted: true
    name: "Button"

sensor:
  - platform: template
    name: "Enrolled Fingerprints"
    id: finger_count
    icon: mdi:counter
    accuracy_decimals: 0
    update_interval: never
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic
  - platform: uptime
    name: "Uptime"
    entity_category: diagnostic

# Registration controls: pick a slot, name it, press Enroll, follow
# "Enrollment Status". Also exposed as HA actions:
# esphome.door_fingerprint_enroll / _delete_slot / _delete_all.
number:
  - platform: template
    name: "Slot"
    id: slot_sel
    min_value: 1
    max_value: 10
    step: 1
    mode: box
    optimistic: true
    restore_value: true
    initial_value: 1
    icon: mdi:numeric

button:
  - platform: template
    name: "Enroll Fingerprint"
    icon: mdi:fingerprint-plus
    on_press:
      - lambda: id(fpc)->start_enroll((int) id(slot_sel).state);
  - platform: template
    name: "Delete Slot"
    icon: mdi:fingerprint-off
    entity_category: config
    on_press:
      - lambda: id(fpc)->delete_slot((int) id(slot_sel).state);
  - platform: template
    name: "DELETE ALL Fingerprints"
    icon: mdi:delete-forever
    entity_category: config
    on_press:
      - lambda: id(fpc)->delete_all();
  - platform: restart
    name: "Restart"
    entity_category: diagnostic

# Editable name per slot — shown in the fired event and "Last Fingerprint".
text:
